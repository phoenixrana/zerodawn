<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Solar farm with panels -->
  <!-- Sun -->
  <circle cx="95" cy="20" r="12" fill="none" stroke="#0A84FF" stroke-width="1.2" opacity="0.6"/>
  <g stroke="#0A84FF" stroke-width="0.8" opacity="0.3">
    <line x1="95" y1="4" x2="95" y2="8"/>
    <line x1="95" y1="32" x2="95" y2="36"/>
    <line x1="79" y1="20" x2="83" y2="20"/>
    <line x1="107" y1="20" x2="111" y2="20"/>
    <line x1="83.7" y1="8.7" x2="86.5" y2="11.5"/>
    <line x1="103.5" y1="28.5" x2="106.3" y2="31.3"/>
    <line x1="83.7" y1="31.3" x2="86.5" y2="28.5"/>
    <line x1="103.5" y1="11.5" x2="106.3" y2="8.7"/>
  </g>

  <!-- Solar panel row 1 -->
  <g stroke="#00C8F8" stroke-width="1.2" opacity="0.85">
    <path d="M10 50 L45 40 L45 55 L10 65 Z"/>
    <!-- Panel grid lines -->
    <line x1="21.7" y1="46.7" x2="21.7" y2="61.7"/>
    <line x1="33.3" y1="43.3" x2="33.3" y2="58.3"/>
    <line x1="10" y1="57.5" x2="45" y2="47.5"/>
  </g>

  <!-- Solar panel row 2 -->
  <g stroke="#00C8F8" stroke-width="1.2" opacity="0.85">
    <path d="M55 50 L90 40 L90 55 L55 65 Z"/>
    <line x1="66.7" y1="46.7" x2="66.7" y2="61.7"/>
    <line x1="78.3" y1="43.3" x2="78.3" y2="58.3"/>
    <line x1="55" y1="57.5" x2="90" y2="47.5"/>
  </g>

  <!-- Solar panel row 3 -->
  <g stroke="#00C8F8" stroke-width="1.2" opacity="0.7">
    <path d="M10 80 L45 70 L45 85 L10 95 Z"/>
    <line x1="21.7" y1="76.7" x2="21.7" y2="91.7"/>
    <line x1="33.3" y1="73.3" x2="33.3" y2="88.3"/>
    <line x1="10" y1="87.5" x2="45" y2="77.5"/>
  </g>

  <!-- Solar panel row 4 -->
  <g stroke="#00C8F8" stroke-width="1.2" opacity="0.7">
    <path d="M55 80 L90 70 L90 85 L55 95 Z"/>
    <line x1="66.7" y1="76.7" x2="66.7" y2="91.7"/>
    <line x1="78.3" y1="73.3" x2="78.3" y2="88.3"/>
    <line x1="55" y1="87.5" x2="90" y2="77.5"/>
  </g>

  <!-- Panel supports -->
  <g stroke="#00C8F8" stroke-width="0.8" opacity="0.3">
    <line x1="27" y1="65" x2="27" y2="72"/>
    <line x1="72" y1="65" x2="72" y2="72"/>
    <line x1="27" y1="95" x2="27" y2="108"/>
    <line x1="72" y1="95" x2="72" y2="108"/>
  </g>

  <!-- Energy flow indicator -->
  <g stroke="#0A84FF" stroke-width="0.8" opacity="0.35">
    <path d="M95 32 Q90 42 75 48" fill="none" stroke-dasharray="3 2"/>
  </g>
</svg>
