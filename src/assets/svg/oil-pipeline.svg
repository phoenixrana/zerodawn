<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Oil/gas pipeline with refinery -->
  <g stroke="#00C8F8" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <!-- Pipeline horizontal -->
    <line x1="5" y1="70" x2="115" y2="70"/>
    <!-- Pipeline vertical section -->
    <line x1="40" y1="70" x2="40" y2="45"/>
    <line x1="80" y1="70" x2="80" y2="45"/>
    <!-- Refinery tower 1 -->
    <rect x="32" y="20" width="16" height="25" rx="2"/>
    <line x1="40" y1="20" x2="40" y2="12"/>
    <!-- Refinery tower 2 -->
    <rect x="72" y="25" width="16" height="20" rx="2"/>
    <line x1="80" y1="25" x2="80" y2="15"/>
    <!-- Connecting pipe -->
    <path d="M48 35 Q60 30 72 35" />
    <!-- Valve -->
    <circle cx="60" cy="70" r="5"/>
    <line x1="55" y1="70" x2="65" y2="70"/>
  </g>
  <!-- Smoke/emissions -->
  <g stroke="#00C8F8" stroke-width="0.8" opacity="0.25">
    <path d="M40 12 Q38 5 42 0"/>
    <path d="M80 15 Q78 8 82 2"/>
  </g>
  <!-- Flow arrows -->
  <g stroke="#00C8F8" stroke-width="0.8" opacity="0.3">
    <path d="M15 66 L20 70 L15 74" fill="none"/>
    <path d="M100 66 L105 70 L100 74" fill="none"/>
  </g>
  <!-- Ground line -->
  <line x1="5" y1="100" x2="115" y2="100" stroke="#00C8F8" stroke-width="0.5" opacity="0.2"/>
  <g stroke="#00C8F8" stroke-width="0.5" opacity="0.15">
    <line x1="15" y1="100" x2="10" y2="108"/>
    <line x1="35" y1="100" x2="30" y2="108"/>
    <line x1="55" y1="100" x2="50" y2="108"/>
    <line x1="75" y1="100" x2="70" y2="108"/>
    <line x1="95" y1="100" x2="90" y2="108"/>
  </g>
</svg>
