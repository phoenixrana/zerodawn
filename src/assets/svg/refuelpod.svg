<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="podGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C8F8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C8F8" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="podGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base platform -->
  <rect x="80" y="240" width="240" height="8" rx="4" fill="rgba(0,200,248,0.1)" stroke="#00C8F8" stroke-width="1" opacity="0.5"/>

  <!-- Main cylinder body -->
  <rect x="120" y="100" width="80" height="140" rx="10" fill="url(#podGrad)" stroke="#00C8F8" stroke-width="1.5"/>
  <!-- Cylinder bands -->
  <line x1="120" y1="130" x2="200" y2="130" stroke="#00C8F8" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="200" x2="200" y2="200" stroke="#00C8F8" stroke-width="0.5" opacity="0.3"/>
  <!-- Cylinder top dome -->
  <path d="M120 110 Q120 80 160 80 Q200 80 200 110" fill="none" stroke="#00C8F8" stroke-width="1.5"/>
  <!-- Valve on top -->
  <rect x="152" y="68" width="16" height="16" rx="3" fill="none" stroke="#00C8F8" stroke-width="1.2"/>
  <circle cx="160" cy="76" r="4" fill="none" stroke="#0A84FF" stroke-width="1" opacity="0.6"/>

  <!-- Pressure gauge -->
  <circle cx="160" cy="155" r="18" fill="none" stroke="#00C8F8" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="155" r="14" fill="rgba(0,200,248,0.05)"/>
  <!-- Gauge needle -->
  <line x1="160" y1="155" x2="170" y2="145" stroke="#00C8F8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gauge marks -->
  <g stroke="#00C8F8" stroke-width="0.5" opacity="0.4">
    <line x1="160" y1="138" x2="160" y2="142"/>
    <line x1="174" y1="155" x2="170" y2="155"/>
    <line x1="146" y1="155" x2="150" y2="155"/>
  </g>
  <text x="160" y="175" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="7" opacity="0.5">350 BAR</text>

  <!-- H2 label -->
  <text x="160" y="220" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="16" font-weight="bold" opacity="0.7">H&#x2082;</text>

  <!-- Hose/connector going to right -->
  <path d="M200 160 Q230 160 240 140 Q250 120 280 120" fill="none" stroke="#00C8F8" stroke-width="2" opacity="0.5" stroke-dasharray="6 3"/>
  <!-- Nozzle -->
  <rect x="280" y="112" width="24" height="16" rx="3" fill="rgba(0,200,248,0.1)" stroke="#00C8F8" stroke-width="1.2"/>
  <line x1="304" y1="116" x2="312" y2="116" stroke="#00C8F8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="304" y1="124" x2="312" y2="124" stroke="#00C8F8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Status LED -->
  <circle cx="295" cy="108" r="3" fill="#00C8F8" opacity="0.8"/>
  <text x="295" y="102" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="7" opacity="0.4">READY</text>

  <!-- Flow arrows -->
  <g stroke="#00C8F8" stroke-width="1" opacity="0.3">
    <path d="M248 135 L254 130 L248 125" fill="none"/>
    <path d="M262 135 L268 130 L262 125" fill="none"/>
  </g>

  <!-- Safety markings -->
  <g fill="#0A84FF" font-family="monospace" font-size="8" opacity="0.35">
    <text x="160" y="100" text-anchor="middle">FLAMMABLE GAS</text>
  </g>

  <!-- Labels -->
  <text x="160" y="270" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="10" opacity="0.4">REFUELPOD STATION</text>
  <text x="160" y="282" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="8" opacity="0.25">&lt; 5 MIN SWAP</text>

  <!-- Certification badge -->
  <rect x="90" y="290" width="50" height="14" rx="3" fill="none" stroke="#00C8F8" stroke-width="0.5" opacity="0.3"/>
  <text x="115" y="300" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="7" opacity="0.3">DGCA</text>

  <rect x="260" y="290" width="50" height="14" rx="3" fill="none" stroke="#0A84FF" stroke-width="0.5" opacity="0.3"/>
  <text x="285" y="300" text-anchor="middle" fill="#0A84FF" font-family="monospace" font-size="7" opacity="0.3">SAFE</text>
</svg>
