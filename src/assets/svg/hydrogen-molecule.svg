<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="atomGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C8F8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00C8F8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="150" rx="180" ry="130" fill="url(#atomGlow)"/>

  <!-- Bond between atoms -->
  <line x1="130" y1="150" x2="270" y2="150" stroke="#00C8F8" stroke-width="3" opacity="0.5" filter="url(#softGlow)"/>
  <line x1="130" y1="150" x2="270" y2="150" stroke="#00C8F8" stroke-width="1" opacity="0.8"/>

  <!-- Electron cloud - left atom -->
  <ellipse cx="130" cy="150" rx="60" ry="45" fill="none" stroke="#00C8F8" stroke-width="0.6" opacity="0.2" transform="rotate(-20, 130, 150)"/>
  <ellipse cx="130" cy="150" rx="55" ry="40" fill="none" stroke="#00C8F8" stroke-width="0.4" opacity="0.15" transform="rotate(25, 130, 150)"/>
  <ellipse cx="130" cy="150" rx="50" ry="50" fill="none" stroke="#00C8F8" stroke-width="0.4" opacity="0.1"/>

  <!-- Electron cloud - right atom -->
  <ellipse cx="270" cy="150" rx="60" ry="45" fill="none" stroke="#00C8F8" stroke-width="0.6" opacity="0.2" transform="rotate(20, 270, 150)"/>
  <ellipse cx="270" cy="150" rx="55" ry="40" fill="none" stroke="#00C8F8" stroke-width="0.4" opacity="0.15" transform="rotate(-25, 270, 150)"/>
  <ellipse cx="270" cy="150" rx="50" ry="50" fill="none" stroke="#00C8F8" stroke-width="0.4" opacity="0.1"/>

  <!-- Left hydrogen atom -->
  <circle cx="130" cy="150" r="28" fill="rgba(0,200,248,0.08)" stroke="#00C8F8" stroke-width="2" filter="url(#softGlow)"/>
  <circle cx="130" cy="150" r="12" fill="rgba(0,200,248,0.15)" stroke="#00C8F8" stroke-width="1"/>
  <text x="130" y="155" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="14" font-weight="bold">H</text>

  <!-- Right hydrogen atom -->
  <circle cx="270" cy="150" r="28" fill="rgba(0,200,248,0.08)" stroke="#00C8F8" stroke-width="2" filter="url(#softGlow)"/>
  <circle cx="270" cy="150" r="12" fill="rgba(0,200,248,0.15)" stroke="#00C8F8" stroke-width="1"/>
  <text x="270" y="155" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="14" font-weight="bold">H</text>

  <!-- Electrons -->
  <circle cx="115" cy="118" r="3" fill="#00C8F8" opacity="0.7"/>
  <circle cx="155" cy="178" r="3" fill="#00C8F8" opacity="0.7"/>
  <circle cx="255" cy="122" r="3" fill="#00C8F8" opacity="0.7"/>
  <circle cx="290" cy="175" r="3" fill="#00C8F8" opacity="0.7"/>

  <!-- Energy release arrows -->
  <g stroke="#0A84FF" stroke-width="1" opacity="0.4">
    <line x1="200" y1="100" x2="200" y2="80"/>
    <line x1="195" y1="86" x2="200" y2="80"/>
    <line x1="205" y1="86" x2="200" y2="80"/>
  </g>
  <text x="200" y="72" text-anchor="middle" fill="#0A84FF" font-family="monospace" font-size="9" opacity="0.5">ENERGY</text>

  <!-- Label -->
  <text x="200" y="240" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="11" opacity="0.4">H&#x2082; MOLECULAR HYDROGEN</text>
  <text x="200" y="255" text-anchor="middle" fill="#00C8F8" font-family="monospace" font-size="9" opacity="0.25">ZERO EMISSION FUEL</text>
</svg>
